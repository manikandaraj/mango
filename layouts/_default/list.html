{{ define "main" }}
  {{ .Content }}
  <section class="post-card-container">
  <h2>{{ .LinkTitle }}</h2>
  <div>
    {{ range .Pages }}
    <a href="{{ .Permalink }}" class="post-card">
      <article>
        <time>{{ .Params.lastmod.Format (.Site.Params.dateFormatToUse) }}</time>
        <h3>{{ .LinkTitle }}</h3>
        <div>{{ .Params.summary }}</div>
        <span class="read-more">{{ i18n "readmore" }}</span>
      </article>
    </a>
    <hr>
    {{ end }}
  </div>
</section>
{{ end }}
